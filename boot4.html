<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>
    <!-- NAVBAR -->
    <!-- fw means font weight used to make text bold, bg-dark means background color dark, text-white means color of
     text is white -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid navbar-dark bg-dark">
            <a class="navbar-brand text-white fw-bold" href="#">Musicflow</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <ul class="navbar-nav">
                        <li class="nav-item">
                            <a class="nav-link active text-white fw-bold" aria-current="page" href="#">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#">Browse</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-white" href="#">Library</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>
    <!-- MAIN BODY -->
    <main>
        <!-- SECTION 1 -->
        <section class="container-lg">
            <!-- DISCOVER NEW MUSIC PART -->
            <div class="row bg-dark py-5">
                <div class="col-md-6 text-white">
                    <h1>Discover New Music</h1>
                    <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit</p>
                    <button class="btn btn-success">Play Now</button>
                    <button class="bttn text-white bg-dark bttn-outline-secondary">Browse</button>
                </div>
                <!-- IMAGE -->
                <div class="col-md-6">
                    <img class="img-fluid rounded-2"
                        src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OHx8bXVzaWN8ZW58MHx8MHx8fDA%3D">
                </div>
            </div>
        </section>
        <!-- SECTION2 -->
        <div class="container-lg">
            <h1 class="my-4">Popular Album</h1>
            <div class="row">
                <!-- CARD1 -->
                <div class="col-md-3">
                    <div class="card">
                        <img src="https://images.unsplash.com/photo-1471478331149-c72f17e33c73?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTR8fG11c2ljfGVufDB8fDB8fHww"
                            class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">DJ Nova</h5>
                        </div>
                    </div>
                </div>
                <!-- CARD2 -->
                <div class="col-md-3">
                    <div class="card">
                        <img src="https://images.unsplash.com/photo-1459749411175-04bf5292ceea?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8bXVzaWN8ZW58MHx8MHx8fDA%3D"
                            class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">Lofi Lab</h5>
                        </div>
                    </div>
                </div>
                <!-- CARD3 -->
                <div class="col-md-3">
                    <div class="card">
                        <img src="https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTF8fG11c2ljfGVufDB8fDB8fHww"
                            class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">The Sparks</h5>
                        </div>
                    </div>
                </div>
                <!-- CARD4 -->
                <div class="col-md-3">
                    <div class="card">
                        <img src="https://images.unsplash.com/photo-1470225620780-dba8ba36b745?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8bXVzaWN8ZW58MHx8MHx8fDA%3D"
                            class="card-img-top" alt="...">
                        <div class="card-body">
                            <h5 class="card-title">Various Artists</h5>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- Section3 -->
    <section>
        <div class="container-lg my-4">
            <!-- Playlists  -->
            <h1>Your Playlists</h1>
            <div class="row">
                <div class="col">
                    <ul class="list-group">
                        <li class="list-group-item d-flex">
                            <span><i class="fa-solid fa-fire"></i>Workout Music</span>
                            <span class="ms-auto">32 Songs</span>
                        </li>
                        <li class="list-group-item d-flex">
                            <span><i class="fa-solid fa-music"></i>Late Night Chill</span>
                            <span class="ms-auto">18 Songs</span>
                        </li>
                        <li class="list-group-item d-flex">
                            <span><i class="fa-solid fa-car"></i>Road Trip</span>
                            <span class="ms-auto">45 Songs</span>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </section>
    <!-- SCRIPT -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
