# Steps to keep track of files:-
 1. Initialize empty git repositry
 git init (command)
 2. convert local changes to staged changes
 git add filepath (Command to add single file)
 git add .  (Command to add multiple file)
 3. Commit
 git commit - m 'message' 
 # To push the code in remote server use command git push
 # To pull the code from remote server use command git pull
 # BRANCHES IN GIT :-
 1. To check existing branches
 git branch
 2. To create a new branch
 git branch 'Branch Name'
 3. To switch to a branch
 git checkout 'Branch Name'
 Combination of step 2 and step 3 :  git checkout -b 'Branch Name'
